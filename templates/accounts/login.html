{% extends 'base.html' %}
{% block title %}Вход — ЛитВечер{% endblock %}
{% block content %}
<div class="form-wrap">
  <h2 style="margin-bottom:24px;text-align:center;">Войти</h2>
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Логин</label><input type="text" name="username" class="form-control" autofocus></div>
    <div class="form-group"><label>Пароль</label><input type="password" name="password" class="form-control"></div>
    {% if form.errors %}
    <div class="alert alert-error"><p>Неверный логин или пароль</p></div>
    {% endif %}
    <button type="submit" class="btn btn-primary btn-block">Войти</button>
  </form>
  <p style="text-align:center;margin-top:16px;color:var(--text2);">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</div>
{% endblock %}
